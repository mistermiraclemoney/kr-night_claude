<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KR NIGHT · 사장님 대시보드</title>
<script src="https://js.tosspayments.com/v1/payment"></script>
<style>
  :root {
    --bg:#0B0B14; --card:#15151F; --card2:#1D1D2B; --border:#2A2A3C;
    --text:#F4F4F8; --sub:#9A9AB0; --blue:#3B9EFF; --pink:#FF3B81;
    --purple:#8B5CF6; --green:#34D399; --yellow:#FBBF24; --danger:#F87171;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Noto Sans KR',sans-serif; min-height:100vh; }
  .wrap { max-width:960px; margin:0 auto; padding:20px; }
  .logo { font-size:26px; font-weight:900; }
  .logo .b { color:var(--blue); } .logo .p { color:var(--pink); }
  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:20px; margin:12px 0; }
  h2 { font-size:17px; margin-bottom:12px; }
  h3 { font-size:14px; color:var(--sub); margin:14px 0 6px; }
  input, select, textarea { width:100%; background:var(--card2); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:11px 13px; font-size:14px; margin:5px 0; font-family:inherit; }
  label { font-size:12px; color:var(--sub); display:block; margin-top:10px; }
  button { background:var(--pink); color:#fff; border:none; border-radius:10px; padding:11px 18px; font-size:14px; font-weight:700; cursor:pointer; margin:6px 4px 0 0; }
  button.blue { background:var(--blue); } button.purple { background:var(--purple); }
  button.ghost { background:transparent; border:1px solid var(--border); color:var(--sub); }
  button.green { background:var(--green); color:#08281c; }
  button:disabled { opacity:.4; cursor:default; }
  .tabs { display:flex; gap:6px; margin:16px 0; flex-wrap:wrap; }
  .tab { padding:9px 16px; border-radius:20px; border:1px solid var(--border); background:var(--card); color:var(--sub); cursor:pointer; font-size:13px; }
  .tab.active { background:var(--pink); border-color:var(--pink); color:#fff; font-weight:700; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:10px; }
  .stat { background:var(--card2); border-radius:12px; padding:16px; text-align:center; }
  .stat .n { font-size:28px; font-weight:900; }
  .stat .l { font-size:12px; color:var(--sub); margin-top:4px; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); }
  .row:last-child { border-bottom:none; }
  .sub { color:var(--sub); font-size:13px; }
  .badge { display:inline-block; font-size:11px; font-weight:700; padding:3px 9px; border-radius:8px; border:1px solid; }
  .bars { display:flex; align-items:flex-end; gap:4px; height:110px; margin-top:10px; }
  .bar { flex:1; background:linear-gradient(180deg,var(--pink),var(--purple)); border-radius:4px 4px 0 0; min-height:2px; position:relative; }
  .bar span { position:absolute; bottom:-18px; left:0; right:0; text-align:center; font-size:9px; color:var(--sub); }
  .plan { border:2px solid var(--border); border-radius:16px; padding:20px; flex:1; min-width:240px; }
  .plan.hot { border-color:var(--pink); }
  .plan .price { font-size:26px; font-weight:900; margin:8px 0; }
  .plan ul { margin:10px 0 14px 18px; color:var(--sub); font-size:13px; line-height:1.9; }
  .flex { display:flex; gap:12px; flex-wrap:wrap; }
  .hidden { display:none !important; }
  .note { background:var(--card2); border-radius:10px; padding:12px; font-size:12px; color:var(--sub); margin-top:10px; line-height:1.6; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:600px){ .two { grid-template-columns:1fr; } }
  #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--card2); border:1px solid var(--pink); padding:12px 22px; border-radius:12px; font-size:14px; display:none; z-index:99; }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
    <div>
      <div class="logo"><span class="b">KR</span><span class="p"> NIGHT</span> <span style="font-size:14px;color:var(--sub)">사장님 대시보드</span></div>
      <div class="sub" id="venue-title"></div>
    </div>
    <button class="ghost hidden" id="btn-logout" onclick="logout()">로그아웃</button>
  </div>

  <!-- LOGIN -->
  <div id="view-login" class="card" style="max-width:420px;margin:60px auto">
    <h2>사장님 로그인</h2>
    <input id="login-email" type="email" placeholder="이메일" value="">
    <input id="login-pw" type="password" placeholder="비밀번호">
    <button onclick="login()" style="width:100%">로그인</button>
    <h3 style="margin-top:20px">아직 계정이 없나요?</h3>
    <input id="reg-nickname" placeholder="사장님 닉네임">
    <input id="reg-handle" placeholder="유저 ID (영문 소문자·숫자·_)">
    <button class="blue" onclick="register()" style="width:100%">사장님 계정 만들기</button>
    <div class="note">데모 계정: owner@krnight.app / krnight123 (헨즈 클럽)</div>
  </div>

  <!-- APP -->
  <div id="view-app" class="hidden">
    <div class="tabs">
      <div class="tab active" data-tab="overview" onclick="showTab('overview')">📊 개요</div>
      <div class="tab" data-tab="venue" onclick="showTab('venue')">🏪 매장 정보</div>
      <div class="tab" data-tab="events" onclick="showTab('events')">📅 이벤트</div>
      <div class="tab" data-tab="coupons" onclick="showTab('coupons')">🎟️ 쿠폰</div>
      <div class="tab" data-tab="subscribe" onclick="showTab('subscribe')">💳 구독</div>
    </div>

    <div id="tab-overview">
      <div class="card">
        <h2>실시간 성과 <span class="sub">— 노출이 아니라 검증된 방문</span></h2>
        <div class="grid" id="stats-grid"></div>
        <h3>최근 14일 체크인</h3>
        <div class="bars" id="chart-days"></div>
        <div style="height:22px"></div>
        <h3>시간대별 체크인 (30일, KST)</h3>
        <div class="bars" id="chart-hours"></div>
        <div style="height:22px"></div>
      </div>
      <div class="card">
        <h2>오늘의 게스트</h2>
        <div id="guest-list"></div>
      </div>
    </div>

    <div id="tab-venue" class="hidden">
      <div class="card" id="venue-form"></div>
    </div>

    <div id="tab-events" class="hidden">
      <div class="card">
        <h2>새 이벤트</h2>
        <div class="two">
          <input id="ev-title" placeholder="이벤트 제목 (예: FRIDAY TAKEOVER)">
          <input id="ev-date" type="date">
        </div>
        <div class="two">
          <input id="ev-lineup" placeholder="라인업 (예: DJ HYPE)">
          <input id="ev-price" placeholder="가격 (예: ₩20,000, 웰컴드링크 포함)">
        </div>
        <button onclick="createEvent()">이벤트 등록</button>
      </div>
      <div class="card"><h2>이벤트 목록</h2><div id="event-list"></div></div>
    </div>

    <div id="tab-coupons" class="hidden">
      <div class="card">
        <h2>새 쿠폰 · 혜택</h2>
        <input id="cp-title" placeholder="쿠폰명 (예: 웰컴 드링크 1잔)">
        <input id="cp-desc" placeholder="설명 (예: QR 체크인 후 바에서 코드 제시)">
        <input id="cp-cost" type="number" placeholder="필요 포인트 (0 = 무료 혜택)">
        <button onclick="createCoupon()">쿠폰 만들기</button>
      </div>
      <div class="card">
        <h2>고객 쿠폰 코드 확인</h2>
        <div style="display:flex;gap:8px">
          <input id="cp-code" placeholder="KRN-XXXXXX" style="text-transform:uppercase">
          <button class="green" onclick="useCoupon()" style="white-space:nowrap">사용 처리</button>
        </div>
      </div>
      <div class="card"><h2>쿠폰 목록</h2><div id="coupon-list"></div></div>
    </div>

    <div id="tab-subscribe">
      <div class="card">
        <h2>구독 플랜 <span class="sub">— 손님이 왔고 다시 왔다는 데이터에 투자하세요</span></h2>
        <div id="current-sub"></div>
        <div class="flex" id="plan-cards" style="margin-top:14px"></div>
        <div class="note" id="pay-note"></div>
        <h3 id="pay-history-h" class="hidden">결제 내역</h3>
        <div id="pay-history"></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>
<script src="app.js"></script>
</body>
</html>
