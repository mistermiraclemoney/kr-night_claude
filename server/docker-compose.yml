# 로컬 개발용 PostgreSQL: docker compose up -d
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: krnight
    ports:
      - "5432:5432"
    volumes:
      - krnight_pgdata:/var/lib/postgresql/data
volumes:
  krnight_pgdata:
